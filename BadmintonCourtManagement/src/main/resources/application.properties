spring.profiles.active=@activeProfile@
#spring.profiles.default=dev
# application.properties
server.servlet.session.timeout=1m
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
# application.properties
#logging.level.org.apache.tomcat=INFO
#logging.level.org.apache.catalina=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate=DEBUG
logging.level.org.hibernate.SQL=DEBUG
#spring.devtools.add-properties=false
currency=VND
#30 minutes
session.timeout=1800000
spring.main.allow-bean-definition-overriding=true
# authentication service
# SSL/mTLS Configuration
server.ssl.enabled=false
# Use 'need' to force the client to provide a certificate
server.ssl.client-auth=need
# Key Store (The server's identity)
server.ssl.key-store=classpath:auth-service/badminton.p12
server.ssl.key-store-password=macbook2019
server.ssl.key-store-type=PKCS12
# Trust Store (Who the server trusts)
server.ssl.trust-store=classpath:auth-service/truststore.jks
server.ssl.trust-store-password=macbook2019